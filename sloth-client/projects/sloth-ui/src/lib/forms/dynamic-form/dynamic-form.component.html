<div class="sl-dynamic-form" [class]="{
        'sl-dynamic-form-column': orientation() === 'horizontal',
        'sl-dynamic-form-row': orientation() === 'vertical',
        'sl-dynamic-form-standard': background() === 'standard',
        'sl-dynamic-form-primary': background() === 'primary',
        'sl-dynamic-form-centered': position() === 'centered',
        'sl-dynamic-form-left': position() === 'left',
        'sl-dynamic-form-right': position() === 'right',
        'sl-dynamic-form-bottom': position() === 'bottom'
    }">
    @for(panel of panels(); track $index) {
        <ng-container slDynamicPanel [pageSync]="pageSync()" [config]="panel"></ng-container>
    }
</div>
