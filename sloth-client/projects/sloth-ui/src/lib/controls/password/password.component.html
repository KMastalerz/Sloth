@if(label()) {
    <label class="sl-control-label">{{ label() }}</label>
}
<div class="sl-control">
    <span class="sl-icon-small"> key </span>
    <input [type]="type()" [placeholder]="placeholder()" [(ngModel)]="value">
    <button type="button">
        <span class="sl-icon-small" (click)="toggleVisibility()"> {{ showHide() }}</span>
    </button>
</div>
