<button [ngClass]="class()" class="sl-button sl-bgcolor-neutral20 sl-square-button-m" (click)="onClick()"> 
    <span [class]="{
        'gl-xxs-icon': size() === 'ultra-small',
        'gl-xs-icon': size() === 'extra-small',
        'gl-s-icon': size() === 'small',
        'gl-m-icon': size() === 'medium',
        'gl-l-icon': size() === 'large',
        'gl-xl-icon': size() === 'extra-large',
    }">{{ toggleIcon() }}</span>
</button>
