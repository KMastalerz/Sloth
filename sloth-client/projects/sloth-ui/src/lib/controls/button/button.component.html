<button class="sl-control-base sl-button"
        [ngClass]="[style(), size(), type()]"
        [matTooltipDisabled]="!showTooltip()"
        [matTooltip]="tooltip()"
        [matTooltipPosition]="tooltipPosition()"
        type="button">
    @if(showIcon()) {
        <span   class="sl-control-icon"
                [matBadge]="count()" 
                [matBadgeHidden]="!showBagde()"> {{ icon() }}</span>
    }
    @if(showLabel()) {
        <label class="sl-control-label">{{ label() }}</label>
    }
</button>
