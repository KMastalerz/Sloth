<a   class="sl-control-base sl-link"
    [class]="{
        'error': counterType() === 'error',
        'warning': counterType() === 'warning',
        'information': counterType() === 'information',
    }"
    [matTooltipDisabled]="!showTooltip()"
    [matTooltip]="tooltip()"
    [matTooltipPosition]="tooltipPosition()"
    [routerLink]="[route()]">

@if(showIcon()) {
    <span   class="sl-control-icon"
            [matBadge]="count()" 
            [matBadgeHidden]="!showBagde()"> {{ icon() }}</span>
}

@if(showLabel()) {
    <label class="sl-control-label">{{ label() }}</label>
    @if(count()) {
        <div    class="sl-link-tag">
            {{ count() }}
        </div>
    }
}
</a>
