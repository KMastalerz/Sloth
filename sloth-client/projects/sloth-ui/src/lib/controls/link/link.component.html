
<a #navLink class="sl-x-pad-s sl-link on-hover-pop" 
            [class]="{
                'sl-grid-3-c': !collapsed(),
                'sl-flex': collapsed(),
                'sl-ctrl-centered': collapsed()
            }"
            [matTooltip]="tooltip()"
            [matTooltipDisabled]="!collapsed() || !tooltip()"
            matTooltipPosition="left"
            [routerLink]="['../', route()]">
    <span   class="gl-l-icon pop"
            [class]="{
                'sl-badge-warning': type() === 'warn',
                'sl-badge-error': type() === 'err'
            }" 
            [matBadge]="count()" 
            [matBadgeHidden]="!collapsed() || !count()">
        {{ icon() }}
    </span>

    @if(!collapsed()) {
    <span class="sl-flex-column sl-text-l">{{ label() }}</span>

        @if(count()) {
            <p class="sl-tag sl-ctrl-pad-xs" [class]="{
                'sl-info-color': type() === 'info',
                'sl-warn-color': type() === 'warn',
                'sl-err-color': type() === 'err'
            }"> {{ count() }}</p>
        }
    }
</a>
