@switch(type()) {
    @case('sideNav') {
       <a   class="sl-control-base sl-link-side-nav"
            [matTooltipDisabled]="!collapsed() || !tooltip()"
            [matTooltip]="tooltip()"
            matTooltipPosition="left"
            [routerLink]="[route()]">
            
            @if(icon()) {
                <span   class="sl-control-icon"
                        [matBadge]="count()" 
                        [matBadgeHidden]="!collapsed() || !count()"> {{ icon() }}</span>
            }

            @if(!collapsed()) {
                <label class="sl-control-label">{{ label() }}</label>
                @if(count()) {
                    <div>
                        {{ count() }}
                    </div>
                }
            }
       </a>
    }
}
