<div class="sl-control-list">
    @if(section().title) {
        <div class="sl-control-list-item-title">{{section().title}}</div>
        <hr class="sl-control-list-item-title-break"/>
    }
    <div class="sl-control-list-section">
        @for(grouped of getSectionGroupedControls(); track $index; let groupIdx = $index) {
            <ng-container>
                <div class="sl-control-list-cell">
                @for(control of grouped.split(','); track $index; let controlIdx = $index) {
                    <ng-container >
                        <ng-container slDynamicControl [config]="getControl(control)" [pageSync]="pageSync()" [index]="controlIdx">
                        </ng-container>
                    </ng-container>
                }
                </div>
            </ng-container>
        }
    </div>
</div>
