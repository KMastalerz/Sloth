<nav    class="sl-panel-absolute sl-side-nav-panel"
        [class]="{
            'expanded': !collapsed(),
            'collapsed': collapsed()
        }"
        [style]="gridArea()">
    <button class="sl-toggle-side-nav" (click)="onClick()">
        <span> {{ toggleIcon() }} </span>
    </button>
    <div class="sl-panel-base">
        <sl-branding-section [showTitle]="!collapsed()"></sl-branding-section>
        @for(section of sections(); track $index) {
            <div class="sl-side-nav-section">
                @if(!collapsed()){
                    <span class="sl-title-section">{{ section.label }}</span>
                }
                @for(control of section.webControls; track $index) {
                    <ng-container slDynamicControl [pageSync]="pageSync()" [config]="control" [navCollapsed]="collapsed()"></ng-container>
                }
            </div>
        }

        <div class="sl-side-nav-section bottom">
            @for(control of controls(); track $index) {
                <ng-container slDynamicControl [pageSync]="pageSync()" [config]="control" [navCollapsed]="collapsed()"></ng-container>
               }
        </div>
    </div>
</nav>
<div class="sl-side-nav-panel-placeholder"></div>
