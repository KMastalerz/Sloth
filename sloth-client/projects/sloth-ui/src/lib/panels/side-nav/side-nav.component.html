<div class="sl-panel-absolute">
    <button class="sl-side-nav-toggle sl-border-radius-xs">
        <span>chevron_left</span>
    </button>
    <div class="sl-panel-base sl-gap-s sl-padding-s sl-border-radius-right-l">
        <sl-branding-section [showTitle]="!collapsed()"></sl-branding-section>
        @for(section of sections(); track $index) {
            @if(!collapsed()){
                <span class="sl-title-section">{{ section.label }}</span>
            }
            @for(control of section.webControls; track $index) {
                <ng-container slDynamicControl [pageSync]="pageSync()" [config]="control"></ng-container>
            }
        }
    </div>
</div>

</div>
