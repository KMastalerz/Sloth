<div    class="sl-panel-absolute sl-side-nav-panel"
        [class]="{
            'sl-width-side-panel-expanded': !collapsed(),
            'sl-width-side-panel-collapsed': collapsed()
        }"
        [style]="gridArea()">
    <button class="sl-toggle-side-nav" (click)="onClick()">
        <span> {{ toggleIcon() }} </span>
    </button>
    <div class="sl-panel-base">
        <sl-branding-section [showTitle]="!collapsed()"></sl-branding-section>
        @for(section of sections(); track $index) {
            @if(!collapsed()){
                <span class="sl-title-section">{{ section.label }}</span>
            }
            @for(control of section.webControls; track $index) {
                <ng-container slDynamicControl [pageSync]="pageSync()" [config]="control" [collapsed]="collapsed()"></ng-container>
            }
        }
    </div>
</div>
<div class="sl-side-nav-panel-placeholder"></div>
