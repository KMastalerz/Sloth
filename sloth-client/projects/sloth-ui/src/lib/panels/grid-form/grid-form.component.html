<div class="sl-grid-form" [style.gridTemplateColumns]="columns()">
    @for(section of sections(); track $index) {
        <ng-container>
            <div class="sl-grid-form-item">
                @if(section.label) {
                    <div class="sl-grid-form-item-title">{{section.label}}</div>
                    <hr class="sl-grid-form-item-title-break"/>
                }
                <div class="sl-grid-form-section">
                    @for(grouped of getSectionGroupedControls(section); track $index) {
                        <ng-container>
                            <div class="sl-grid-form-cell">
                            @for(control of grouped.split(','); track $index) {
                                <ng-container >
                                    <ng-container slDynamicControl [config]="getControl(section, control)" [opCom]="opCom()">
                                    </ng-container>
                                </ng-container>
                            }
                            </div>
                        </ng-container>
                    }
                </div>
            </div>
        </ng-container>
    }
</div>
