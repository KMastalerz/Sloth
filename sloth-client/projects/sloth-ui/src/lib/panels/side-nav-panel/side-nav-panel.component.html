
<div class="sl-side-nav-panel sl-bgcolor-neutral10 sl-inout-xs" [class]="{
    'sl-side-nav-expanded': !collapsed(),
    'sl-side-nav-collapsed': collapsed(),
}">
    <sl-toggle-icon [class]="'sl-absolute sl-top-right sl-move-right-50-top-50 sl-ctrl-shadow'"
                    onFalse="chevron_left"
                    onTrue="chevron_right"
                    (onToggle)="onToggle()"></sl-toggle-icon>
    @for(section of sections(); track $index) {
        <ng-container slDynamicSection  [sectionID]="section.sectionID"
                                        [formSync]="formSync()"></ng-container>
    }
</div>
