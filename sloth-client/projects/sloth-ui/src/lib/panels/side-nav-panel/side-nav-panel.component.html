
<div class="sl-side-nav-panel sl-bgcolor-neutral10 sl-inout-xs" [class]="{
    'sl-side-nav-expanded': !collapsed(),
    'sl-side-nav-collapsed': collapsed(),
}">
    <sl-branding class="sl-b-margin-m" title="Sloth" imgPath="assets/icon.png" [showTitle]="!collapsed()"/>

    <ng-container slDynamicControl [controlID]="'Toggle'" 
                                   [formSync]="formSync()" 
                                   [class]="'sl-absolute sl-top-right sl-move-right-50-top-50 sl-ctrl-shadow'" 
                                   (actionEvent)="onToggle()" 
                                   [value]="false"></ng-container>

    <nav class="sl-flex-column sl-gap-xxs">
        
    </nav>
</div>
